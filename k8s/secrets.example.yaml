# Copy to secrets.yaml and fill in real values (DO NOT commit secrets.yaml).
# In production prefer a managed secret store (AWS Secrets Manager, Vault, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: rtc-secrets
  namespace: rtc
type: Opaque
stringData:
  DATABASE_URL: postgres://rtc:rtc@postgres:5432/rtc
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: replace-with-strong-random-secret
  JWT_REFRESH_SECRET: replace-with-strong-random-secret
