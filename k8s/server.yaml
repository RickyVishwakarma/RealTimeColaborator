apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtc-server
  namespace: rtc
  labels: { app: rtc-server }
spec:
  replicas: 3
  selector:
    matchLabels: { app: rtc-server }
  template:
    metadata:
      labels: { app: rtc-server }
    spec:
      containers:
        - name: server
          image: rtc-server:latest # replace with your registry/tag in CD
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: rtc-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '4000'
            - name: CLIENT_ORIGIN
              value: https://app.example.com
          resources:
            requests: { cpu: '250m', memory: '256Mi' }
            limits: { cpu: '1', memory: '512Mi' }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          # Allow in-flight WebSocket sessions to drain on shutdown.
          lifecycle:
            preStop:
              exec:
                command: ['sh', '-c', 'sleep 10']
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rtc-server
  namespace: rtc
spec:
  selector: { app: rtc-server }
  ports:
    - port: 80
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rtc-server
  namespace: rtc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rtc-server
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
